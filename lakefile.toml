name = "LeanTutorial"
defaultTargets = ["LeanTutorial"]

[leanOptions]
pp.unicode.fun = true
autoImplicit = false
relaxedAutoImplicit = false

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[require]]
scope = "leanprover"
name = "doc-gen4"
git = "https://github.com/leanprover/doc-gen4.git"
rev = "main"
«env» = "dev"

[[lean_lib]]
name = "LeanTutorial"
