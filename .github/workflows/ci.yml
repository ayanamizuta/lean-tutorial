name: CI - Lean 証明チェック

on:
  push:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.lean'
      - 'lean-toolchain'
      - 'lakefile.toml'
      - 'lake-manifest.json'
  workflow_dispatch:

# 同一 ref への重複実行をキャンセル
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Lean プロジェクトのビルドと証明チェック
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Elan のインストール
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Lean ツールチェインのインストール
        run: |
          elan toolchain install $(cat lean-toolchain)
          elan default $(cat lean-toolchain)
          lean --version
          lake --version

      - name: ファイル一覧の確認
        run: |
          echo "=== lakefile.toml ==="
          cat lakefile.toml
          echo ""
          echo "=== lean-toolchain ==="
          cat lean-toolchain
          echo ""
          echo "=== lake-manifest.json (先頭) ==="
          head -20 lake-manifest.json

      - name: Lake 依存関係の解決確認
        run: lake resolve-deps 2>&1 || true

      - name: Mathlib キャッシュの取得
        run: lake exe cache get || echo "cache get failed with exit code $?"

      - name: lake build によるビルドと証明チェック
        run: lake build
