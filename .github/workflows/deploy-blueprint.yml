name: CD - Blueprint ページ生成・デプロイ

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

# GitHub Pages へのデプロイに必要なパーミッション
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Blueprint のビルドと GitHub Pages へのデプロイ
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lean のセットアップ
        uses: leanprover/lean-action@v1
        with:
          build: false
          use-mathlib-cache: false
          use-github-cache: false

      - name: doc-gen4 依存関係の解決
        run: lake update doc-gen4

      - name: Mathlib キャッシュの取得
        run: lake exe cache get

      - name: lake build によるビルド（出力をキャプチャ）
        run: lake build 2>&1 | tee build_output.txt

      - name: sorry 検出に基づく \leanok 自動挿入
        run: cat build_output.txt | python3 scripts/auto_leanok.py blueprint/src/content.tex

      - name: doc-gen4 による Lean APIドキュメント生成
        run: |
          lake -R -Kenv=dev build LeanTutorial:docs
          mkdir -p docs
          cp -r .lake/build/doc docs/docs

      - name: Blueprint のビルド（PDF と Web）
        uses: xu-cheng/texlive-action@v2
        with:
          docker_image: ghcr.io/xu-cheng/texlive-full:20231201
          run: |
            apk update
            apk add --update make py3-pip git pkgconfig graphviz graphviz-dev gcc musl-dev font-noto-cjk
            git config --global --add safe.directory $GITHUB_WORKSPACE
            git config --global --add safe.directory $(pwd)
            python3 -m venv env
            source env/bin/activate
            pip install --upgrade pip requests wheel
            LDFLAGS="-L/usr/lib/graphviz/" pip install pygraphviz
            pip install leanblueprint
            leanblueprint pdf
            mkdir -p docs
            cp blueprint/print/print.pdf docs/blueprint.pdf || true
            leanblueprint web
            cp -r blueprint/web docs/blueprint
            echo '<meta http-equiv="refresh" content="0;url=blueprint/">' > docs/index.html

      - name: Blueprint 宣言の確認（lean_decls）
        run: leanblueprint checkdecls || true

      - name: docs ディレクトリのオーナーを修正
        run: sudo chown -R runner docs || true

      - name: GitHub Pages の設定
        uses: actions/configure-pages@v5

      - name: Pages アーティファクトのアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: GitHub Pages へのデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
